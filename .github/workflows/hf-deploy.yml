name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]
  # Allows manual triggers from the GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Hugging Face requires full git history

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Verify token exists
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is empty or not found in GitHub Repository Secrets! Please add your Hugging Face Write Access Token under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          # 2. Configure Git credentials
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 3. Push to Hugging Face Space repository
          # Using oauth:<token> is the recommended passwordless format for Hugging Face Git actions
          git push --force https://oauth:$HF_TOKEN@huggingface.co/spaces/QWAtro/videoplay HEAD:refs/heads/main
